<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pausas Activas - Inlotrans</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            font-family: Arial, sans-serif; 
        }
        #main-container { 
            position: relative; 
            width: 100%; 
            height: 100vh; 
        }
        #excel-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        #init-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            text-align: center;
        }
        #start-btn {
            padding: 15px 30px;
            font-size: 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        #start-btn:hover {
            background: #45a049;
        }
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }
        #dynamic-content {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .birthday-background-image {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }
        #birthday-text {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            font-weight: bold;
            color: #d32f2f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            white-space: nowrap;
        }
        #audio-button {
            display: none;
        }
    </style>
</head>
<body>
    <div id="main-container">
        <!-- Overlay de inicio -->
        <div id="init-overlay">
            <h1>🎉 Pausas Activas - Inlotrans</h1>
            <p>Haga clic para iniciar la reproducción con sonido.</p>
            <button id="start-btn" onclick="handleStartSound()">Iniciar con Sonido 🔊</button>
        </div>

        <!-- Iframe de SharePoint (Excel) - URL corregida sin espacios -->
        <iframe 
            id="excel-frame"
            src="https://inlotrans-my.sharepoint.com/personal/dennis_ballesteros_inlotrans_com_co/_layouts/15/Doc.aspx?sourcedoc={6bc28fc1-11cf-4248-92d7-de4b07511a83}&action=embedview&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True"
            allowfullscreen>
        </iframe>

        <!-- Capa para videos y cumpleaños -->
        <div id="overlay">
            <div id="dynamic-content"></div>
            <div id="birthday-text"></div>
            <button id="audio-button"></button>
        </div>
    </div>

    <!-- Cargar base.js -->
    <script src="js/base.js"></script>
    
    <script>
        let userInteracted = false;

        function handleStartSound() {
            userInteracted = true;
            const initOverlay = document.getElementById('init-overlay');
            const excelFrame = document.getElementById('excel-frame');
            
            if (initOverlay) {
                initOverlay.style.display = 'none';
            }
            
            if (excelFrame) {
                excelFrame.style.display = 'block';
            }
            
            console.log("✅ Sonido activado - Interacción registrada");
            
            // Iniciar verificación de estado
            if (typeof checkEstado === 'function') {
                checkEstado();
                setInterval(checkEstado, 15000);
            }
        }
    </script>
</body>
</html>
